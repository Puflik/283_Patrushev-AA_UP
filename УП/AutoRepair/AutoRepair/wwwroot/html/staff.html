<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Сотрудники — АвтоТранс</title>
  <link rel="stylesheet" href="../css/shared.css?v=4"/>
</head>
<body>
<input type="hidden" id="currentUserId" value=""/>
<input type="hidden" id="currentUserRole" value=""/>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar__logo">АвтоТранс</div>
    <div class="sidebar__role" id="sidebarRole">—</div>
    <div class="sidebar__divider"></div>
    <a class="sidebar__link" href="/requests"><span class="icon">☰</span> Заявки</a>
    <a class="sidebar__link" href="/statistics" id="linkStats"><span class="icon">#</span> Статистика</a>
    <a class="sidebar__link active" href="/staff" id="linkStaff"><span class="icon">@</span> Сотрудники</a>
    <a class="sidebar__link hidden" href="/messages" id="linkMessages"><span class="icon">✉</span> Сообщения</a>
    <div class="sidebar__bottom">
      <div class="sidebar__divider"></div>
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="sidebarAvatar">—</div>
        <div><div class="sidebar__uname" id="sidebarName">—</div></div>
      </div>
      <div class="sidebar__logout"><a href="/api/logout">Выйти</a></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar__title">Сотрудники</span>
      <span class="topbar__sub">Управление персоналом</span>
    </div>
    <div class="content">

      <div class="flex items-center justify-between mb-16">
        <div class="filters" style="margin-bottom:0;" id="staffPills">
          <button class="filter-btn active" data-r="all">Все</button>
          <button class="filter-btn" data-r="mechanic">Механики</button>
          <button class="filter-btn" data-r="manager">Менеджеры</button>
          <button class="filter-btn" data-r="admin">Администраторы</button>
          <button class="filter-btn" data-r="inactive">Неактивные</button>
        </div>
        <button class="btn btn-primary" id="btnAddStaff">+ Добавить</button>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table id="t1">
            <thead>
              <tr>
                <th>Сотрудник</th>
                <th>Роль</th>
                <th>Телефон</th>
                <th>Логин</th>
                <th>Статус</th>
                <th>Активных заявок</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Модальное окно: добавить сотрудника -->
<div id="addStaffModal" class="modal-overlay hidden">
  <div class="card" style="width:90%;max-width:440px;">
    <div class="card-header"><span class="card-title">Добавить сотрудника</span></div>
    <div class="flex-col gap-16">
      <div class="form-group">
        <label>ФИО</label>
        <input type="text" id="asName" placeholder="Иванов Иван Иванович"/>
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="text" id="asPhone" placeholder="+7 (___) ___-__-__"/>
      </div>
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="asLogin" placeholder="Уникальный логин"/>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="asPassword"/>
      </div>
      <div class="form-group">
        <label>Роль</label>
        <select id="asRole">
          <option value="mechanic">Механик</option>
          <option value="operator">Оператор</option>
          <option value="manager">Менеджер по качеству</option>
          <option value="admin">Администратор</option>
        </select>
      </div>
      <div class="error-msg" id="asErr"></div>
    </div>
    <div class="divider"></div>
    <div class="flex gap-12">
      <button class="btn btn-primary" id="asSaveBtn">Добавить</button>
      <button class="btn btn-ghost" id="asCancelBtn">Отмена</button>
    </div>
  </div>
</div>

<script src="../js/shared.js?v=4"></script>
<script src="../js/staff.js?v=4"></script>
</body>
</html>
