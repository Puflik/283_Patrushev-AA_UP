<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Заявки — АвтоТранс</title>
  <link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<input type="hidden" id="currentUserId" value="" />
<input type="hidden" id="currentUserRole" value="" />

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar__logo">АвтоТранс</div>
    <div class="sidebar__role" id="sidebarRole">—</div>
    <div class="sidebar__divider"></div>
    <a class="sidebar__link active" href="/requests">
      <span class="icon">☰</span> Заявки
    </a>
    <a class="sidebar__link" href="/statistics" id="linkStats">
      <span class="icon">#</span> Статистика
    </a>
    <a class="sidebar__link hidden" href="/staff" id="linkStaff">
      <span class="icon">@</span> Сотрудники
    </a>
    <div class="sidebar__bottom">
      <div class="sidebar__divider"></div>
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="sidebarAvatar">—</div>
        <div>
          <div class="sidebar__uname" id="sidebarName">—</div>
          <div class="sidebar__uemail" id="sidebarLogin">—</div>
        </div>
      </div>
      <div class="sidebar__logout"><a href="/api/logout">Выйти</a></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar__title">Заявки</span>
      <span class="topbar__sub">Управление заявками</span>
    </div>
    <div class="content">

      <div class="search-bar">
        <span class="text-muted">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск по номеру, клиенту..." />
      </div>
      <div class="filters">
        <button class="filter-btn active" data-status="all">Все</button>
        <button class="filter-btn" data-status="new">Новые</button>
        <button class="filter-btn" data-status="in_progress">В работе</button>
        <button class="filter-btn" data-status="waiting">Ожидание</button>
        <button class="filter-btn" data-status="done">Завершено</button>
      </div>

      <div class="card" style="padding:0; overflow:hidden;">
        <div class="table-wrap">
          <table id="t1">
            <thead>
              <tr>
                <th>№</th>
                <th>Дата</th>
                <th>Вид авто</th>
                <th>Модель</th>
                <th>Проблема</th>
                <th>Статус</th>
                <th>Механик</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/requests.js"></script>
</body>
</html>
