<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Новая заявка — АвтоТранс</title>
  <link rel="stylesheet" href="../css/shared.css">
</head>
<body>

<input type="hidden" id="currentUserId" value="" />

<nav class="client-nav">
  <span class="client-nav__logo">АвтоТранс</span>
  <div class="client-nav__links">
    <a class="client-nav__link" href="/profile">Главная</a>
    <a class="client-nav__link" href="/my-requests">Мои заявки</a>
    <a class="client-nav__link active" href="/create-request">Создать заявку</a>
    <a class="client-nav__link" href="/faq">FAQ</a>
    <a class="client-nav__link" href="/contact">Связаться с нами</a>
  </div>
  <div class="client-nav__user">
    <div class="client-nav__avatar">ИИ</div>
    <span class="client-nav__name"></span>
  </div>
</nav>

<div style="padding: 28px 40px;">
  <div class="breadcrumb mb-16">
    <a href="/my-requests">Заявки</a> / Новая заявка
  </div>
  <h1 class="mb-24">Новая заявка</h1>

  <div class="grid-2" style="max-width:1000px;">

    <div class="card">
      <div class="card-header">
        <span class="card-title">Данные о заявке</span>
      </div>

      <div class="flex-col gap-16">
        <div class="form-group">
          <label>Выберите автомобиль</label>
          <select id="carSelect">
            <option value="">— выберите из списка —</option>
          </select>
        </div>

        <div class="form-group">
          <label>Вид автомобиля</label>
          <input type="text" id="carType" placeholder="Легковой, грузовой..." />
        </div>

        <div class="form-group">
          <label>Модель автомобиля</label>
          <input type="text" id="carModel" placeholder="Toyota Camry 2020" />
        </div>

        <div class="form-group">
          <label>Описание проблемы</label>
          <textarea id="problemDescryption" placeholder="Опишите неисправность подробно..."></textarea>
        </div>

        <div class="form-group">
          <label>Желаемая дата выполнения (необязательно)</label>
          <input type="date" id="completionDate" />
        </div>

        <div class="divider"></div>
        <div class="flex gap-12">
          <button class="btn btn-primary" id="saveBtn">Отправить заявку</button>
          <button class="btn btn-ghost" id="resetBtn">Очистить</button>
        </div>
      </div>
    </div>

    <div class="card" style="align-self:start;">
      <div class="card-header">
        <span class="card-title">Как это работает</span>
      </div>
      <div class="flex-col gap-16">
        <div class="flex gap-12 items-center">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">1</div>
          <span class="text-sm">Создайте заявку с описанием проблемы</span>
        </div>
        <div class="flex gap-12 items-center">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">2</div>
          <span class="text-sm">Менеджер назначит автомеханика</span>
        </div>
        <div class="flex gap-12 items-center">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">3</div>
          <span class="text-sm">Механик выполнит ремонт</span>
        </div>
        <div class="flex gap-12 items-center">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">4</div>
          <span class="text-sm">Вы получите уведомление о готовности</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="../js/create-request.js"></script>
</body>
</html>
